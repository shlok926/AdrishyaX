{% extends 'base.html' %}

{% block title %}Decode | StegoForge v4{% endblock %}
{% block page_title %}/decode/single{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Extract Payload</h2>
    <form id="decodeForm" onsubmit="handleDecode(event)">
        <div class="form-group">
            <label for="image">> SELECT ENCRYPTED CARRIER</label>
            <input type="file" id="image" name="image" class="form-control" accept="image/png, image/jpeg" required>
        </div>
        
        <div class="form-group">
            <label for="password">> ENTER CHACHA/PRIMARY KEY</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem">[-] INITIATE EXTRACTION</button>
    </form>
</div>

<div class="card" id="resultCard" style="display:none; border-color: var(--color-code)">
    <h2 class="card-title" style="color:var(--color-code)">>_ PAYLOAD DECRYPTED</h2>
    <pre id="decodedMessage" style="white-space: pre-wrap; border: 1px solid var(--color-border); padding: 1rem; margin-top: 1rem; color: var(--color-success)"></pre>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function handleDecode(e) {
        e.preventDefault();
        const formData = new FormData(e.target);

        try {
            const res = await fetch('/api/v1/decode', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('decodedMessage').innerText = data.message;
            } else {
                alert('Decode failed: ' + (data.error || JSON.stringify(data)));
            }
        } catch(e) {
            console.error(e);
            alert('Operation failed');
        }
    }
</script>
{% endblock %}
